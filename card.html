<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THSM · 文字卡片生成器（内部工具）</title>
<link rel="icon" type="image/svg+xml" href="THSM_square_black.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=IM+Fell+English:ital@0;1&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mp4-muxer@5/build/mp4-muxer.min.js"></script>
<style>
  :root {
    --char: #16120e; --char-2: #1c1813; --black: #0a0908;
    --gold: #c9a86a; --gold-deep: #8f7338; --gold-dim: #b89c62;
    /* -text variants: one step brighter than the brand tones, for type over imagery */
    --gold-text: #d8bc80;
    --blood: #8a3a34; --blood-text: #d65c4d; --ash: #b3a895; --ash-text: #c6bcaa;
    --on-dark: #efe9df; --on-dark-mut: #b3a895; --on-dark-faint: #6f6450;
    --hair: rgba(201,168,106,0.16);
    --display: 'Playfair Display', Georgia, serif;
    --sacred: 'Cinzel', Georgia, serif;
    --quote: 'IM Fell English', Georgia, serif;
    --body: 'EB Garamond', Georgia, serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--body); background: var(--char); color: var(--on-dark);
    display: flex; min-height: 100vh; overflow: hidden;
  }

  /* ---------- control panel ---------- */
  .panel {
    flex: 0 0 320px; height: 100vh; overflow-y: auto;
    background: var(--char-2); border-right: 1px solid var(--hair);
    padding: 1.6rem 1.4rem 3rem;
  }
  .panel h1 {
    font-family: var(--sacred); font-weight: 600; font-size: 0.78rem;
    letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold);
    margin-bottom: 1.6rem;
  }
  .panel label, .panel .field {
    display: block; margin-bottom: 1rem;
    font-size: 0.82rem; color: var(--on-dark-mut); letter-spacing: 0.04em;
  }
  .panel .field-name { display: block; margin-bottom: 0.35rem; }
  textarea, input[type="text"], select {
    width: 100%; background: rgba(255,255,255,0.05); color: var(--on-dark);
    border: 1px solid var(--hair); border-radius: 2px;
    padding: 0.5em 0.7em; font-family: var(--body); font-size: 0.95rem;
  }
  textarea { resize: vertical; line-height: 1.5; }
  textarea:focus, input:focus, select:focus { outline: none; border-color: var(--gold-deep); }
  select option { background: var(--char-2); }
  input[type="range"] { width: 100%; accent-color: var(--gold); }
  input[type="file"] { width: 100%; font-size: 0.78rem; color: var(--on-dark-mut); }
  input[type="file"]::file-selector-button {
    background: rgba(201,168,106,0.14); color: var(--gold); border: 1px solid var(--hair);
    border-radius: 2px; padding: 0.35em 0.8em; margin-right: 0.6em;
    font-family: var(--body); cursor: pointer;
  }
  .row { display: flex; gap: 0.7rem; }
  .row > label { flex: 1; }
  fieldset {
    border: 1px solid var(--hair); border-radius: 2px;
    padding: 0.9rem 0.8rem 0.4rem; margin-bottom: 1.2rem;
  }
  legend {
    font-family: var(--sacred); font-size: 0.62rem; letter-spacing: 0.26em;
    text-transform: uppercase; color: var(--gold-dim); padding: 0 0.4em;
  }
  .btn {
    display: inline-block; width: 100%; cursor: pointer;
    background: var(--gold); color: #14110d;
    font-family: var(--display); font-weight: 900; font-size: 1rem;
    letter-spacing: 0.02em; padding: 0.7em 1.2em;
    border: none; border-top: 2px solid #9c7f42; border-radius: 2px;
    box-shadow: inset 0 -2px 0 rgba(95,77,40,0.4);
  }
  .btn:hover { background: #d8b978; }
  .btn:disabled { opacity: 0.5; cursor: wait; }
  .btn-ghost {
    background: none; border: 1px solid var(--hair); color: var(--on-dark-mut);
    font-family: var(--body); font-weight: 400; font-size: 0.8rem;
    box-shadow: none; border-top-width: 1px; padding: 0.4em 0.9em;
    width: auto; margin-top: 0.5rem;
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.05); color: var(--on-dark); }
  .preset-row { display: flex; gap: 0.5rem; margin-bottom: 1.2rem; }
  .preset-row .btn-ghost { flex: 1; margin-top: 0; padding: 0.45em 0.4em; text-align: center; }
  .hint { font-size: 0.72rem; color: var(--on-dark-faint); line-height: 1.5; margin-top: 1rem; }

  /* ---------- preview area ---------- */
  .preview {
    flex: 1; height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--black);
    background-image: radial-gradient(rgba(95,77,40,0.05) 0.5px, transparent 0.5px);
    background-size: 4px 4px;
    overflow: hidden; padding: 2rem;
  }
  #scaler { flex: 0 0 auto; }

  /* ---------- the card ---------- */
  #stage {
    position: relative; width: 1080px; height: 1350px;
    overflow: hidden; transform-origin: top left;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  }
  .bg-base { position: absolute; inset: 0; background: radial-gradient(120% 90% at 50% 40%, #1d1813, #0e0b07 75%); }
  #stage.accent-blood .bg-base { background: radial-gradient(120% 90% at 50% 40%, #1e1110, #0c0807 75%); }
  .bg-img { position: absolute; inset: 0; display: none; }
  #stage.has-img .bg-img { display: block; }
  /* tone/brightness/fade are baked into the image pixels (see processBg) —
     CSS filters and blend modes get dropped by WebKit when rasterizing the export SVG */
  .bg-img img {
    width: 100%; height: 100%; object-fit: cover; object-position: center;
  }
  /* 完整 mode: the whole plate, edges baked to fade into the card */
  #stage.img-fit .bg-img img { object-fit: contain; }
  .vignette { position: absolute; inset: 0; }
  #stage.has-img .vignette {
    background:
      radial-gradient(115% 82% at 50% 42%, transparent 0%, rgba(10,9,8,0.5) 74%, rgba(10,9,8,0.82) 100%),
      linear-gradient(180deg, rgba(10,9,8,0.5) 0%, transparent 24%, transparent 60%, rgba(10,9,8,0.7) 100%);
  }
  .grain {
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(95,77,40,0.05) 0.5px, transparent 0.5px);
    background-size: 4px 4px;
  }
  .content {
    position: absolute; inset: 0; padding: 96px 90px;
    display: flex; flex-direction: column; align-items: center;
    justify-content: space-between; text-align: center;
  }
  .c-eyebrow {
    font-family: var(--sacred); font-weight: 600; font-size: 27px;
    letter-spacing: 0.42em; text-transform: uppercase; color: #c9ad74;
    text-indent: 0.42em; /* re-center letterspaced caps */
    min-height: 1em;
  }
  #stage.accent-blood .c-eyebrow { color: var(--blood-text); }
  /* min-height:0 keeps flex from growing this box past the leftover space,
     which is what lets autoFit detect real overflow */
  .c-mid { flex: 1; min-height: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 0; }
  .c-quote {
    max-width: 100%; white-space: pre-line; color: #f6f0e5;
    font-family: var(--display); font-weight: 700; line-height: 1.18; letter-spacing: -0.005em;
  }
  /* over imagery: a tight 1px shadow defines the letter edge, a wide one lifts it off the image */
  #stage.has-img .c-quote,
  #stage.has-img .c-attr { text-shadow: 0 1px 3px rgba(0,0,0,0.55), 0 4px 26px rgba(0,0,0,0.45); }
  #stage.has-img .c-eyebrow,
  #stage.has-img .c-series { text-shadow: 0 1px 2px rgba(0,0,0,0.5), 0 3px 14px rgba(0,0,0,0.4); }
  #stage.style-scripture .c-quote {
    font-family: var(--sacred); font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.07em; line-height: 1.32;
  }
  #stage.style-citation .c-quote {
    font-family: var(--quote); font-style: italic; font-weight: 400;
    line-height: 1.42; letter-spacing: 0.01em;
  }
  #stage.style-prose .c-quote {
    font-family: var(--body); font-weight: 400;
    line-height: 1.52; letter-spacing: 0.005em;
  }
  .c-rule { width: 1px; height: 64px; margin: 44px auto 30px; background: linear-gradient(var(--gold-deep), transparent); }
  #stage.accent-blood .c-rule { background: linear-gradient(var(--blood), transparent); }
  .c-attr {
    font-family: var(--quote); font-style: italic; font-size: 34px;
    color: var(--gold-text); letter-spacing: 0.02em;
  }
  #stage.accent-blood .c-attr { color: var(--blood-text); }
  .brand-full svg { display: block; width: 216px; height: auto; margin: 0 auto; opacity: 0.92; color: #ECE5D7; }
  .c-tag {
    font-family: var(--sacred); font-weight: 600; font-size: 19px;
    letter-spacing: 0.36em; text-transform: uppercase; color: var(--on-dark-mut);
    text-indent: 0.36em; margin-top: 26px;
  }

  /* blind-emboss watermark: tone-on-tone cut letters, faint gold seam */
  .c-mark { display: flex; justify-content: center; color: rgba(239,233,223,0.14); }
  .c-mark svg { width: 160px; height: auto; }
  .emb-txt { font-family: var(--display); font-weight: 900; font-size: 40px; letter-spacing: 1px; fill: currentColor; }
  .c-mark-braille { display: flex; justify-content: center; color: rgba(201,168,106,0.35); }
  .c-mark-braille svg { width: 88px; height: auto; }
  .c-mark-braille svg circle { fill: currentColor; }
  .c-handle {
    font-family: var(--body); font-size: 21px; letter-spacing: 0.06em;
    color: var(--on-dark-mut); opacity: 0.55; margin-top: 14px; text-align: center;
  }

  /* series numeral, top corner */
  .c-series {
    position: absolute; top: 96px; right: 90px;
    font-family: var(--sacred); font-weight: 600; font-size: 24px;
    letter-spacing: 0.2em; color: #c9ad74; opacity: 0.75;
  }

  /* inline emphasis: *italic* and **accent** */
  .c-quote em { font-style: italic; }
  .em-acc { color: var(--gold-text); }
  #stage.accent-blood .em-acc { color: var(--blood-text); }

  /* ~severed word~: the wordmark's cut, applied to type.
     --cwt/--cwb/--cwl are set per-font at runtime from measured metrics (see tuneCut) */
  /* every box that clips (outer AND both slices) needs side padding offset by
     negative margins: overflow clips at the padding edge, so this widens the
     clip region without moving the text. 0.35em covers the skew shift plus
     italic overhang at the first glyph */
  .cut-word {
    display: inline-block; position: relative; overflow: hidden;
    vertical-align: -0.24em; padding: 0 0.35em; margin: 0 -0.35em;
  }
  .cut-word .cw-t { display: block; overflow: hidden; height: var(--cwt, 0.6em); line-height: 1; }
  .cut-word .cw-b { display: block; overflow: hidden; height: var(--cwb, 0.55em); }
  .cut-word .cw-t, .cut-word .cw-b { padding: 0 0.35em; margin: 0 -0.35em; }
  .cut-word .cw-b > span {
    display: block; line-height: 1;
    transform: translateY(calc(-1 * var(--cwt, 0.6em))) skewX(-8deg); transform-origin: 0 0;
  }
  .cut-word .cw-l {
    position: absolute; left: 0.15em; right: 0.15em; top: var(--cwl, 0.58em); height: 0.045em; min-height: 2px;
    border-radius: 1px;
    background: linear-gradient(90deg, #6E4F22, #C49A52 30%, #F4E2AC 50%, #C49A52 70%, #714F22);
  }

  /* ---------- motion: rasterization passes & preview canvas ----------
     each pass isolates one layer. Only siblings are ever hidden and text is
     blanked via glyph fill — a visibility:visible override under a hidden
     ancestor gets dropped by WebKit's foreignObject rasterizer */
  #stage.ras-bg .content { visibility: hidden; }
  #stage.ras-nobg .bg-base, #stage.ras-nobg .bg-img,
  #stage.ras-nobg .vignette, #stage.ras-nobg .grain { visibility: hidden; }
  /* transparent glyphs must not cast shadows — Chromium paints the shadow
     of transparent-filled text, which bakes dark ghosts into other layers */
  #stage.ras-chrome .c-quote, #stage.ras-attr .c-quote, #stage.ras-slice .c-quote { text-shadow: none; }
  #stage.ras-top.has-img .cw-t, #stage.ras-bot.has-img .cw-b { text-shadow: 0 2px 28px rgba(0,0,0,0.5); }
  /* chrome = eyebrow / series / brand block, shown with the first beat */
  #stage.ras-chrome .c-quote { -webkit-text-fill-color: transparent; }
  #stage.ras-chrome .cut-word, #stage.ras-chrome .c-rule, #stage.ras-chrome .c-attr { visibility: hidden; }
  /* attribution + rule, shown with the last beat */
  #stage.ras-attr .c-quote { -webkit-text-fill-color: transparent; }
  #stage.ras-attr .cut-word, #stage.ras-attr .c-eyebrow,
  #stage.ras-attr .c-series, #stage.ras-attr .c-brand { visibility: hidden; }
  /* beat passes: per-beat glyph fill is set inline by buildLayers */
  #stage.ras-beats .c-eyebrow, #stage.ras-beats .c-series, #stage.ras-beats .c-rule,
  #stage.ras-beats .c-attr, #stage.ras-beats .c-brand { visibility: hidden; }
  /* severed-word slice passes */
  #stage.ras-slice .c-eyebrow, #stage.ras-slice .c-series, #stage.ras-slice .c-rule,
  #stage.ras-slice .c-attr, #stage.ras-slice .c-brand { visibility: hidden; }
  #stage.ras-slice .c-quote { -webkit-text-fill-color: transparent; }
  #stage.ras-top .cw-b, #stage.ras-top .cw-l { visibility: hidden; }
  #stage.ras-top .cw-t, #stage.ras-top .cw-t * { -webkit-text-fill-color: currentColor; }
  #stage.ras-bot .cw-t, #stage.ras-bot .cw-l { visibility: hidden; }
  #stage.ras-bot .cw-b, #stage.ras-bot .cw-b * { -webkit-text-fill-color: currentColor; }
  /* skew is re-applied progressively on canvas, so the raster is upright */
  #stage.no-skew .cw-b > span { transform: translateY(calc(-1 * var(--cwt, 0.6em))); }

  /* fire anchor marker (preview only) */
  #fireMark {
    position: absolute; width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid var(--gold); transform: translate(-50%, -50%);
    pointer-events: none; opacity: 0; z-index: 6;
  }
  #fireMark.pulse { animation: firemark 1.2s ease-out; }
  @keyframes firemark {
    0% { opacity: 0; }
    25% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.6); }
  }

  #scaler { position: relative; }
  #motionCanvas {
    position: absolute; inset: 0; width: 100%; height: 100%;
    display: none; z-index: 5;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  }

  /* ash accent: the third tone — lament, between blood and gold */
  #stage.accent-ash .bg-base { background: radial-gradient(120% 90% at 50% 40%, #191713, #0c0b09 75%); }
  #stage.accent-ash .c-eyebrow, #stage.accent-ash .c-series { color: #b6ac9a; }
  #stage.accent-ash .c-attr { color: var(--ash-text); }
  #stage.accent-ash .c-rule { background: linear-gradient(#8f8674, transparent); }
  #stage.accent-ash .em-acc { color: var(--ash-text); }

  /* ---------- editorial layout: text top-left, image lower-right ---------- */
  #stage.layout-editorial .content { align-items: flex-start; text-align: left; }
  #stage.layout-editorial .c-eyebrow { text-indent: 0; }
  #stage.layout-editorial .c-mid {
    justify-content: flex-start; align-items: flex-start;
    padding-top: 70px; max-width: 92%;
  }
  #stage.layout-editorial .c-rule { display: none !important; }
  #stage.layout-editorial .c-attr {
    font-family: var(--sacred); font-style: normal; font-weight: 600;
    font-size: 26px; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--on-dark-mut); margin-top: 70px;
  }
  #stage.layout-editorial .bg-img { inset: auto 0 0 auto; width: 74%; height: 66%; }
  #stage.layout-editorial.has-img .vignette { background: none; }
  #stage.layout-editorial .c-mark,
  #stage.layout-editorial .c-mark-braille { justify-content: flex-start; }
  #stage.layout-editorial .c-handle, #stage.layout-editorial .c-tag { text-align: left; }

  /* ---------- paper: light reading zone card ---------- */
  #stage.bg-paper .bg-base { background: radial-gradient(120% 90% at 50% 40%, #f4efe5, #e6dfd0 75%); }
  #stage.bg-paper .grain { background-image: radial-gradient(rgba(90,70,40,0.05) 0.5px, transparent 0.5px); }
  #stage.bg-paper .c-quote { color: #221d17; text-shadow: none; }
  #stage.bg-paper .c-attr, #stage.bg-paper .c-eyebrow, #stage.bg-paper .c-series { text-shadow: none; }
  #stage.bg-paper .c-eyebrow, #stage.bg-paper .c-series,
  #stage.bg-paper .c-attr, #stage.bg-paper .em-acc { color: var(--gold-deep); }
  #stage.bg-paper.accent-blood .c-eyebrow, #stage.bg-paper.accent-blood .c-series,
  #stage.bg-paper.accent-blood .c-attr, #stage.bg-paper.accent-blood .em-acc { color: var(--blood-deep); }
  #stage.bg-paper.accent-ash .c-eyebrow, #stage.bg-paper.accent-ash .c-series,
  #stage.bg-paper.accent-ash .c-attr, #stage.bg-paper.accent-ash .em-acc { color: #6b6051; }
  #stage.bg-paper .c-rule { background: linear-gradient(var(--gold-deep), transparent); }
  #stage.bg-paper.accent-blood .c-rule { background: linear-gradient(var(--blood-deep), transparent); }
  #stage.bg-paper.accent-ash .c-rule { background: linear-gradient(#6b6051, transparent); }
  #stage.bg-paper.layout-editorial .c-attr { color: #5a5044; }
  #stage.bg-paper .c-tag, #stage.bg-paper .c-handle { color: #5a5044; }
  #stage.bg-paper .c-mark { color: rgba(34,29,23,0.13); }
  #stage.bg-paper .c-mark-braille { color: rgba(143,115,56,0.42); }
  #stage.bg-paper .brand-full svg { color: #221d17; }
  #stage.bg-paper.has-img .vignette {
    background:
      radial-gradient(115% 82% at 50% 42%, transparent 0%, rgba(241,236,229,0.45) 74%, rgba(241,236,229,0.75) 100%),
      linear-gradient(180deg, rgba(241,236,229,0.5) 0%, transparent 24%, transparent 60%, rgba(241,236,229,0.6) 100%);
  }
  #stage.bg-paper.layout-editorial.has-img .vignette { background: none; }

  /* Reel UI occlusion guides — preview only, filtered out of export */
  .safe-overlay { position: absolute; inset: 0; display: none; pointer-events: none; }
  #stage.show-safe .safe-overlay { display: block; }
  .sz {
    position: absolute; background: rgba(138,58,52,0.22);
    outline: 1px dashed rgba(173,76,68,0.65); outline-offset: -1px;
    font-family: var(--body); font-size: 22px; color: rgba(240,200,195,0.85);
    display: flex; align-items: center; justify-content: center;
  }
  .sz-top { top: 0; left: 0; right: 0; height: 220px; }
  .sz-bottom { bottom: 0; left: 0; right: 0; height: 420px; }
  .sz-right { right: 0; top: 220px; bottom: 420px; width: 130px; }

  /* ---------- mobile: stacked layout ---------- */
  @media (max-width: 760px) {
    body { flex-direction: column; overflow: auto; }
    .preview { order: -1; flex: none; width: 100%; height: 54vh; min-height: 340px; padding: 1.2rem; }
    .panel {
      flex: none; width: 100%; height: auto; overflow: visible;
      border-right: none; border-top: 1px solid var(--hair);
      padding-bottom: 4rem;
    }
    /* 16px+ prevents iOS auto-zoom on focus */
    textarea, input[type="text"], select { font-size: 16px; }
  }
</style>
</head>
<body>

<aside class="panel">
  <h1>THSM · 文字卡片</h1>

  <div class="preset-row">
    <button class="btn btn-ghost preset" type="button" data-preset="declare">宣言</button>
    <button class="btn btn-ghost preset" type="button" data-preset="comfort">安慰</button>
    <button class="btn btn-ghost preset" type="button" data-preset="scripture">经文</button>
    <button class="btn btn-ghost preset" type="button" data-preset="paperq">纸面引文</button>
  </div>

  <label><span class="field-name">文字（*斜体* · **强调色** · ~切断~ · |分镜）</span>
    <textarea id="quoteIn" rows="5">Words have weight. Real weight.</textarea>
  </label>
  <label><span class="field-name">出处 / 署名</span>
    <input type="text" id="attrIn" placeholder="— Job 13:15">
  </label>
  <label><span class="field-name">顶部小字（可留空）</span>
    <input type="text" id="eyebrowIn" placeholder="FROM THE ASH">
  </label>
  <label><span class="field-name">底部小字（logo 下方）</span>
    <input type="text" id="tagIn" placeholder="WEAR WHAT YOU'VE SURVIVED">
  </label>

  <div class="row">
    <label><span class="field-name">布局</span>
      <select id="layoutIn">
        <option value="center">居中宣言</option>
        <option value="editorial">编辑排版</option>
      </select>
    </label>
    <label><span class="field-name">水印</span>
      <select id="markIn">
        <option value="emboss">压印 THSM（隐形）</option>
        <option value="braille">盲文 THSM（彩蛋）</option>
        <option value="full">完整 logo</option>
        <option value="none">无</option>
      </select>
    </label>
  </div>

  <div class="row">
    <label><span class="field-name">底色</span>
      <select id="bgIn">
        <option value="dark">暗夜</option>
        <option value="paper">纸面</option>
      </select>
    </label>
    <label><span class="field-name">系列编号（可留空）</span>
      <input type="text" id="seriesIn" placeholder="Ⅳ / Ⅶ">
    </label>
  </div>

  <label><span class="field-name"><input type="checkbox" id="handleIn"> 显示 @ThoughHeSlayMeWear</span></label>

  <div class="row">

<script>
(function () {
  var SIZES = { post: [1080, 1350], square: [1080, 1080], story: [1080, 1920], pin: [1000, 1500] };
  var RATIO_NAMES = { post: '帖子 4:5', square: '方形 1:1', story: 'Reel / Story 9:16', pin: 'Pinterest 2:3' };
  var stage = document.getElementById('stage');
  var bgImg = document.getElementById('bgImg');
  var BLANK = bgImg.src; // 1×1 transparent placeholder — an empty <img> src breaks html-to-image
  var rawImg = null;     // the untouched upload; bgImg always holds the processed version
  var WEBKIT = /iPhone|iPad|iPod/.test(navigator.userAgent) ||
    (/AppleWebKit/.test(navigator.userAgent) && !/Chrom|Edg/.test(navigator.userAgent));
  var $ = function (id) { return document.getElementById(id); };

  /* inline markup: *italic*, **accent**, ~severed word~ */
  function fmt(t) {
    return t
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*([^*]+)\*\*/g, '<span class="em-acc">$1</span>')
      .replace(/\*([^*]+)\*/g, '<em>$1</em>')
      .replace(/~([^~]+)~/g,
        '<span class="cut-word"><span class="cw-t">$1</span><span class="cw-b"><span>$1</span></span><span class="cw-l"></span></span>');
  }

  /* place the cut from measured font metrics — guessed em values drift per font
     (Playfair's tall ascenders pushed the seam high and the sliced word low) */
  function tuneCut() {
    var q = $('cQuote');
    if (!q.querySelector('.cut-word')) return;
    var cs = getComputedStyle(q);
    var ctx = (tuneCut._c || (tuneCut._c = document.createElement('canvas'))).getContext('2d');
    ctx.font = (cs.fontStyle === 'italic' ? 'italic ' : '') + cs.fontWeight + ' 100px ' + cs.fontFamily;
    var m = ctx.measureText('H');
    var capAsc = (m.actualBoundingBoxAscent || 70) / 100;
    var fba = (m.fontBoundingBoxAscent || 90) / 100;
    var fbd = (m.fontBoundingBoxDescent || 25) / 100;
    // glyph baseline offset inside a line-height:1 box (content area is centered)
    var baseline = (1 - (fba + fbd)) / 2 + fba;
    var waist = baseline - capAsc * 0.43; // seam 57% down the cap, like the wordmark
    q.style.setProperty('--cwt', waist.toFixed(4) + 'em');
    // 0.24em of descender room below the cut; vertical-align -0.24em cancels it,
    // so the sliced word's baseline lands exactly on the line's baseline
    q.style.setProperty('--cwb', (baseline - waist + 0.24).toFixed(4) + 'em');
    q.style.setProperty('--cwl', (waist - 0.0225).toFixed(4) + 'em');
  }

  /* bake tone/brightness (and the editorial edge fade) into the pixels —
     WebKit drops CSS filters and blend modes when rasterizing the export SVG,
     so the displayed image must already be final */
  function processBg() {
    if (!rawImg) return;
    var maxW = 1400;
    var k = Math.min(1, maxW / rawImg.naturalWidth);
    var w = Math.round(rawImg.naturalWidth * k), h = Math.round(rawImg.naturalHeight * k);
    var c = document.createElement('canvas'); c.width = w; c.height = h;
    var ctx = c.getContext('2d');
    ctx.drawImage(rawImg, 0, 0, w, h);
    var tone = $('toneIn').value;
    var bright = $('brightIn').value / 100;
    var editorial = $('layoutIn').value === 'editorial';
    var fitMode = $('fitIn').value === 'fit';
    var paper = $('bgIn').value === 'paper';
    var ACC = { gold: [201, 168, 106], blood: [138, 58, 52], ash: [179, 168, 149] };
    var ACC_DEEP = { gold: [143, 115, 56], blood: [94, 38, 36], ash: [107, 96, 81] };
    var accName = $('accentIn').value;
    // dark: shadows sink into the card, highlights rise toward the accent;
    // paper: shadows hold the deep accent, highlights dissolve into the paper
    var lo = paper ? ACC_DEEP[accName] : [14, 11, 7];
    var hi = paper ? [241, 236, 226] : ACC[accName];
    var d = ctx.getImageData(0, 0, w, h), px = d.data;
    var fadeX = w * 0.38, fadeY = h * 0.34;
    var feX = w * 0.1, feY = h * 0.1;
    for (var i = 0, p = 0; i < px.length; i += 4, p++) {
      var l = (0.2126 * px[i] + 0.7152 * px[i + 1] + 0.0722 * px[i + 2]) / 255 * bright;
      if (l > 1) l = 1;
      if (tone === 'original') {
        px[i] *= bright; px[i + 1] *= bright; px[i + 2] *= bright;
      } else if (tone === 'mono' && !paper) {
        px[i] = px[i + 1] = px[i + 2] = l * 255;
      } else {
        var mlo = lo, mhi = hi;
        if (tone === 'mono') { mlo = [34, 29, 23]; mhi = [241, 236, 226]; } // ink-on-paper grayscale
        px[i]     = mlo[0] + (mhi[0] - mlo[0]) * l;
        px[i + 1] = mlo[1] + (mhi[1] - mlo[1]) * l;
        px[i + 2] = mlo[2] + (mhi[2] - mlo[2]) * l;
      }
      if (fitMode) { // 完整 mode: all four edges melt into the card
        var xf = p % w, yf = (p / w) | 0;
        var fx = Math.min(1, xf / feX, (w - 1 - xf) / feX);
        var fy = Math.min(1, yf / feY, (h - 1 - yf) / feY);
        var f = (fx < 0 ? 0 : fx) * (fy < 0 ? 0 : fy);
        px[i + 3] = px[i + 3] * f;
      } else if (editorial) { // fade top and left edges into the background
        var x = p % w, y = (p / w) | 0;
        var ax = x < fadeX ? x / fadeX : 1;
        var ay = y < fadeY ? y / fadeY : 1;
        px[i + 3] = px[i + 3] * ax * ay;
      }
    }
    ctx.putImageData(d, 0, 0);
    bgImg.src = (fitMode || editorial) ? c.toDataURL('image/png') : c.toDataURL('image/jpeg', 0.92);
  }

  function updateRatioLabels() {
    var k = parseInt($('scaleIn').value, 10) || 1;
    Array.prototype.forEach.call($('ratioIn').options, function (o) {
      o.textContent = RATIO_NAMES[o.value] + ' · ' + (SIZES[o.value][0] * k) + '×' + (SIZES[o.value][1] * k);
    });
  }

  function render() {
    // | splits the quote into sequential beats for the motion timeline;
    // static layout is identical — beats are unstyled inline spans
    $('cQuote').innerHTML = $('quoteIn').value.split('|').map(function (sg, i) {
      return '<span class="beat" data-beat="' + i + '">' + fmt(sg.trim()) + '</span>';
    }).join(' ');
    $('cQuote').style.fontSize = $('fontIn').value + 'px';
    $('fontVal').textContent = $('fontIn').value;

    var attr = $('attrIn').value.trim();
    $('cAttr').textContent = attr;
    $('cRule').style.display = attr ? '' : 'none';
    $('cAttr').style.display = attr ? '' : 'none';

    $('cEyebrow').textContent = $('eyebrowIn').value.trim();
    $('cTag').textContent = $('tagIn').value.trim();
    $('cTag').style.display = $('tagIn').value.trim() ? '' : 'none';

    var mark = $('markIn').value;
    $('brandFull').style.display = mark === 'full' ? '' : 'none';
    $('brandMark').style.display = mark === 'emboss' ? '' : 'none';
    $('brandBraille').style.display = mark === 'braille' ? '' : 'none';
    $('cHandle').style.display = $('handleIn').checked ? '' : 'none';
    $('cSeries').textContent = $('seriesIn').value.trim();

    stage.className =
      'accent-' + $('accentIn').value +
      ' style-' + $('styleIn').value +
      ' tone-' + $('toneIn').value +
      ' layout-' + $('layoutIn').value +
      ' bg-' + $('bgIn').value +
      ' img-' + $('fitIn').value +
      (rawImg ? ' has-img' : '') +
      ($('safeIn').checked ? ' show-safe' : '');

    bgImg.style.objectPosition = $('posXIn').value + ' ' + $('posIn').value;
    $('brightVal').textContent = $('brightIn').value;

    var s = SIZES[$('ratioIn').value];
    stage.style.width = s[0] + 'px';
    stage.style.height = s[1] + 'px';
    autoFit();
    tuneCut();
    fit();
    $('durVal').textContent = $('durIn').value;
    $('fireScaleVal').textContent = $('fireScaleIn').value;
    motion.layers = null; // card changed — rasterized layers are stale
    saveState();
  }

  /* the size slider sets the ceiling; long quotes shrink until they fit.
     scrollHeight misses content that centered flex pushes above the box,
     so overflow is measured from the children's actual bounds */
  function midOverflow() {
    var mid = document.querySelector('.c-mid');

          });

        Math.sin(ts * (6 + rnd(i, 4) * 12) + rnd(i, 5) * 6.28) * span * 0.35 * cyc;

            enc.flush().then(function () {
              muxer.finalize();
              resolve({ blob: new Blob([muxer.target.buffer], { type: 'video/mp4' }), ext: 'mp4' });
            }, reject);
            return;
          }
          drawFrame(ctx, i / (total - 1), p, L);
          var vf = new VideoFrame(cv, {
            timestamp: Math.round(i * 1e6 / FPS),
            duration: Math.round(1e6 / FPS),
          });
          enc.encode(vf, { keyFrame: i % 60 === 0 });
          vf.close();
          if (i % 15 === 0) btn.textContent = '编码中 ' + Math.round(i / total * 100) + '%…';
          i++;
          nextTick(step);
        } catch (e) { reject(e); }
      }
      step();
    });
  }

  function encodeRecorder(cv, ctx, p, L, FPS, btn) {
    return new Promise(function (resolve, reject) {
      if (!window.MediaRecorder) { reject(new Error('浏览器不支持视频导出')); return; }
      var mime = ['video/mp4;codecs=avc1', 'video/mp4', 'video/webm;codecs=vp9', 'video/webm']
        .filter(function (m) { return MediaRecorder.isTypeSupported(m); })[0];
      if (!mime) { reject(new Error('浏览器不支持视频导出')); return; }
      var rec = new MediaRecorder(cv.captureStream(FPS), { mimeType: mime, videoBitsPerSecond: 16000000 });
      var parts = [];
      rec.ondataavailable = function (e) { if (e.data.size) parts.push(e.data); };
      rec.onstop = function () {
        resolve({ blob: new Blob(parts, { type: mime }), ext: mime.indexOf('mp4') > -1 ? 'mp4' : 'webm' });
      };
      rec.onerror = function (e) { reject(e.error || e); };
      rec.start(200);
      btn.textContent = '录制中（实时）…';
      var t0 = performance.now();
      function loop(now) {
        var t = (now - t0) / (p.dur * 1000);
        if (t >= 1) {
          drawFrame(ctx, 1, p, L);
          setTimeout(function () { rec.stop(); }, 250);
          return;
        }
        drawFrame(ctx, t, p, L);
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    });
  }

  $('motionBtn').addEventListener('click', function () {
    var btn = this;
    btn.disabled = true; btn.textContent = '生成图层…';
    var p = motionParams();
    var FPS = 30;
    buildLayers().then(function (L) {
      var cv = document.createElement('canvas');
      cv.width = p.size[0]; cv.height = p.size[1];
      var ctx = cv.getContext('2d');
      if (window.VideoEncoder && window.Mp4Muxer) {
        return encodeWebCodecs(cv, ctx, p, L, FPS, btn).catch(function (e) {
          // hardware/codec refusal → realtime recorder still gets a file out
          return encodeRecorder(cv, ctx, p, L, FPS, btn);
        });
      }
      return encodeRecorder(cv, ctx, p, L, FPS, btn);
    }).then(function (res) {
      download(res.blob, 'thsm-motion-' + p.size[0] + 'x' + p.size[1] + '-' + Date.now() + '.' + res.ext);
    }).catch(function (e) {
      alert('导出失败：' + e);
    }).finally(function () {
      btn.disabled = false; btn.textContent = '导出 MP4';
    });
  });

  /* ---------- fire anchoring ---------- */
  function showAnchorMark(a) {
    var scaler = document.getElementById('scaler');
    var m = document.getElementById('fireMark');
    if (!m) {
      m = document.createElement('div');
      m.id = 'fireMark';
      scaler.appendChild(m);
    }
    m.style.left = (a.x * 100) + '%';
    m.style.top = (a.y * 100) + '%';
    m.classList.remove('pulse');
    void m.offsetWidth; // restart the animation
    m.classList.add('pulse');
  }

  document.getElementById('scaler').addEventListener('click', function (ev) {
    if ($('fireIn').value !== 'on') return;
    var r = this.getBoundingClientRect();
    fireAnchor = {
      x: Math.min(0.98, Math.max(0.02, (ev.clientX - r.left) / r.width)),
      y: Math.min(0.98, Math.max(0.02, (ev.clientY - r.top) / r.height)),
    };
    showAnchorMark(fireAnchor);
    saveState();
  });

  /* the burning bush is usually the brightest thing in the plate —
     suggest the brightest cell of the background as the anchor */
  $('fireAutoBtn').addEventListener('click', function () {
    var btn = this;
    btn.disabled = true; btn.textContent = '分析中…';
    snapLayer('ras-bg').then(function (bg) {
      var gw = 24, gh = 30;
      var c = document.createElement('canvas');
      c.width = gw; c.height = gh;
      var cx = c.getContext('2d');
      cx.drawImage(bg, 0, 0, gw, gh);
      var d = cx.getImageData(0, 0, gw, gh).data;
      var best = -1, bi = 0;
      for (var i = 0; i < gw * gh; i++) {
        var l = 0.2126 * d[i * 4] + 0.7152 * d[i * 4 + 1] + 0.0722 * d[i * 4 + 2];
        if (l > best) { best = l; bi = i; }
      }
      fireAnchor = { x: ((bi % gw) + 0.5) / gw, y: (Math.floor(bi / gw) + 0.5) / gh };
      if ($('fireIn').value !== 'on') { $('fireIn').value = 'on'; }
      showAnchorMark(fireAnchor);
      saveState();
    }).catch(function (e) {
      alert('分析失败：' + e);
    }).finally(function () {
      btn.disabled = false; btn.textContent = '自动寻找亮部';
    });
  });

  /* internal hooks for debugging the motion pipeline */
  window.__thsmMotion = {
    build: buildLayers, draw: drawFrame, params: motionParams,
    encode: encodeWebCodecs, fire: drawFire,
    setAnchor: function (x, y) { fireAnchor = { x: x, y: y }; },
    getAnchor: function () { return fireAnchor; },
  };

  $('exportBtn').addEventListener('click', function () {
    var btn = this;
    btn.disabled = true; btn.textContent = '生成中…';
    var key = $('ratioIn').value;
    var scale = parseInt($('scaleIn').value, 10) || 1;
    document.fonts.ready.then(function () {
      return makeBlob(key, scale);
    }).then(function (blob) {
      download(blob, 'thsm-card-' + (SIZES[key][0] * scale) + 'w-' + Date.now() + '.png');
    }).catch(function (err) {
      alert('导出失败：' + err);
    }).finally(function () {
      btn.disabled = false; btn.textContent = '导出 PNG';
    });
  });

  $('exportAllBtn').addEventListener('click', function () {
    var btn = this;
    btn.disabled = true;
    var scale = parseInt($('scaleIn').value, 10) || 1;
    var orig = $('ratioIn').value;
    var keys = ['post', 'story', 'pin'];
    var stamp = Date.now();
    document.fonts.ready.then(function () {
      return keys.reduce(function (chain, key, i) {
        return chain.then(function () {
          btn.textContent = '生成中 ' + (i + 1) + '/' + keys.length + '…';
          $('ratioIn').value = key;
          render();
          return makeBlob(key, scale).then(function (blob) {
            download(blob, 'thsm-' + key + '-' + (SIZES[key][0] * scale) + 'w-' + stamp + '.png');
            // pause between downloads so the browser doesn't swallow them
            return new Promise(function (r) { setTimeout(r, 500); });
          });
        });
      }, Promise.resolve());
    }).catch(function (err) {
      alert('导出失败：' + err);
    }).finally(function () {
      $('ratioIn').value = orig;
      render();
      btn.disabled = false; btn.textContent = '导出全部尺寸';
    });
  });

  /* attribution lives in the Pin's description, not in the pixels */
  $('pinBtn').addEventListener('click', function () {
    var btn = this;
    var quote = $('quoteIn').value.replace(/\*\*?|~/g, '').trim();
    var attr = $('attrIn').value.trim();
    var text = '“' + quote + '”' + (attr ? ' ' + attr : '') +
      '\n\nThough He Slay Me — wear what you’ve survived.' +
      '\nthoughheslayme.com · @ThoughHeSlayMeWear';
    function done() {
      btn.textContent = '已复制';
      setTimeout(function () { btn.textContent = '复制 Pin 描述'; }, 1600);
    }
    function fallback() {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); done(); } catch (e) { alert('复制失败'); }
      ta.remove();
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, fallback);
    } else { fallback(); }
  });

  loadState();
  updateRatioLabels();
  if ($('plateIn').value) loadPlate($('plateIn').value, true);
  render();
  // font metrics differ once the webfonts land; re-measure the cut then
  document.fonts.ready.then(render);
})();
</script>
</body>
</html>
